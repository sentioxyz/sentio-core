syntax = "proto3";

package evm;

option go_package = "sentioxyz/sentio-core/chain/evm/protos";

import "google/protobuf/struct.proto";

message AccessListItem {
  string address = 1;
  repeated string storage_keys = 2;
}

message Transaction {
  string block_number = 1;
  string block_hash = 2;
  string transaction_index = 3;
  string hash = 4;
  string chain_id = 5;

  string type = 6;
  string from = 7;
  string to = 8;
  string input = 9;
  string value = 10;
  string nonce = 11;
  string gas = 12;
  string gas_price = 13;
  string max_fee_per_gas = 14;
  string max_priority_fee_per_gas = 15;
  repeated AccessListItem access_list = 16;
}

message TransactionReceipt {
  string gas_used = 1;
  string cumulative_gas_used = 2;
  string effective_gas_price = 3;
  string status = 4; // 0x0: failed, 0x1: succeed
  string error = 5;
  string revert_reason = 6;
  google.protobuf.ListValue logs = 7;
}
